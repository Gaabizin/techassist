<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - TechAssist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0 border-top border-success border-4">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold">Nova Conta</h2>
                            <p class="text-muted">Junte-se à TechAssist</p>
                        </div>

                        <form id="formCadastro">
                            <div class="mb-3">
                                <label class="form-label fw-bold">E-mail</label>
                                <input type="email" id="emailCadastro" class="form-control" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Senha (Mínimo 6 letras/números)</label>
                                <input type="password" id="senhaCadastro" class="form-control" required minlength="6">
                            </div>
                            
                            <button type="button" id="btnCadastrar" class="btn btn-success w-100 mb-3 fw-bold">Cadastrar</button>
                        </form>
                        
                        <div class="text-center mt-3">
                            <a href="login.html" class="text-decoration-none text-muted">Já tem uma conta? Faça Login aqui. ⬅️</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/cadastro.js"></script>
</body>
</html>
