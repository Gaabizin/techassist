<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - TechAssist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0 border-top border-success border-4">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold">Nova Conta</h2>
                            <p class="text-muted">Junte-se à TechAssist</p>
                        </div>

                        <form id="formCadastro">
                            <div class="mb-3">
                                <label class="form-label fw-bold">E-mail</label>
                                <input type="email" id="emailCadastro" class="form-control" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Senha (Mínimo 6 letras/números)</label>
                                <input type="password" id="senhaCadastro" class="form-control" required minlength="6">
                            </div>
                            
                            <button type="button" id="btnCadastrar" class="btn btn-success w-100 mb-3 fw-bold">Cadastrar</button>
                        </form>
                        
                        <div class="text-center mt-3">
                            <a href="login.html" class="text-decoration-none text-muted">Já tem uma conta? Faça Login aqui. ⬅️</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // --- COLE A SUA CONFIGURAÇÃO AQUI ---
        const firebaseConfig = {
            apiKey: "AIzaSyD1M0lzF2IgXYZttiyzJib9wTZgyw3Mzv4",
            authDomain: "techassist-4ea7f.firebaseapp.com",
            projectId: "techassist-4ea7f",
            storageBucket: "techassist-4ea7f.firebasestorage.app",
            messagingSenderId: "612558349071",
            appId: "1:612558349071:web:f645ae8537162cf51d547a"
        };
        // ------------------------------------

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const btnCadastrar = document.getElementById("btnCadastrar");

        btnCadastrar.addEventListener("click", async () => {
            const email = document.getElementById("emailCadastro").value;
            const senha = document.getElementById("senhaCadastro").value;

            if(!email || senha.length < 6) {
                alert("Preencha o e-mail e use uma senha de pelo menos 6 caracteres.");
                return;
            }

            try {
                btnCadastrar.innerText = "Criando conta... ⏳";
                await createUserWithEmailAndPassword(auth, email, senha);
                
                alert("✅ Conta criada com sucesso! Redirecionando para o Login...");
                
                // Mágica: Após criar a conta, joga o cliente automaticamente para a tela de login!
                window.location.href = "login.html"; 
                
            } catch (erro) {
                console.error(erro);
                alert("❌ Erro ao criar conta. Esse e-mail já pode estar em uso ou é inválido.");
                btnCadastrar.innerText = "Cadastrar";
            }
        });
    </script>
</body>
</html>
