<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TechAssist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0 border-top border-primary border-4">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold">TechAssist</h2>
                            <p class="text-muted">Faça login ou crie sua conta</p>
                        </div>

                        <form id="formLogin">
                            <div class="mb-3">
                                <label class="form-label fw-bold">E-mail</label>
                                <input type="email" id="emailLogin" class="form-control" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Senha (Mínimo 6 letras/números)</label>
                                <input type="password" id="senhaLogin" class="form-control" required minlength="6">
                            </div>
                            
                            <button type="button" id="btnEntrar" class="btn btn-primary w-100 mb-2 fw-bold">Entrar</button>
                            <a href="cadastro.html" class="btn btn-outline-secondary w-100 fw-bold">Criar Nova Conta</a>
                        </form>
                        
                        <div class="text-center mt-3">
                            <a href="index.html" class="text-decoration-none text-muted">⬅ Voltar para a Home</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // Importando as ferramentas de Senha e E-mail
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1M0lzF2IgXYZttiyzJib9wTZgyw3Mzv4",
            authDomain: "techassist-4ea7f.firebaseapp.com",
            projectId: "techassist-4ea7f",
            storageBucket: "techassist-4ea7f.firebasestorage.app",
            messagingSenderId: "612558349071",
            appId: "1:612558349071:web:f645ae8537162cf51d547a"
        };
        // ------------------------------------

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 👑 DEFINA AQUI O E-MAIL QUE TERÁ ACESSO AO PAINEL ADMIN
        const EMAIL_ADMIN = "gabrieldietrich98@gmail.com"; 

        const btnEntrar = document.getElementById("btnEntrar");
        const btnCriar = document.getElementById("btnCriar");

        // LÓGICA 1: CRIAR CONTA (CLIENTE OU ADMIN)
        btnCriar.addEventListener("click", async () => {
            const email = document.getElementById("emailLogin").value;
            const senha = document.getElementById("senhaLogin").value;

            if(!email || senha.length < 6) {
                alert("Preencha o e-mail e use uma senha de pelo menos 6 caracteres.");
                return;
            }

            try {
                btnCriar.innerText = "Criando...";
                await createUserWithEmailAndPassword(auth, email, senha);
                alert("✅ Conta criada com sucesso! Faça o login agora.");
                btnCriar.innerText = "Criar Nova Conta";
            } catch (erro) {
                console.error(erro);
                alert("❌ Erro ao criar conta. Esse e-mail já pode estar em uso.");
                btnCriar.innerText = "Criar Nova Conta";
            }
        });

        // LÓGICA 2: ENTRAR E VERIFICAR QUEM É
        btnEntrar.addEventListener("click", async () => {
            const email = document.getElementById("emailLogin").value;
            const senha = document.getElementById("senhaLogin").value;

            try {
                btnEntrar.innerText = "Verificando...";
                await signInWithEmailAndPassword(auth, email, senha);
                
                // O GRANDE TRUQUE DO REDIRECIONAMENTO:
                if (email === EMAIL_ADMIN) {
                    // É o dono! Vai para o painel secreto.
                    window.location.href = "admin.html";
                } else {
                    // É um cliente normal! Volta para a Home (ou futura área do cliente).
                    alert("Bem-vindo(a)! Login de cliente efetuado.");
                    window.location.href = "index.html"; 
                }

            } catch (erro) {
                console.error(erro);
                alert("❌ Senha incorreta ou conta não existe.");
                btnEntrar.innerText = "Entrar";
            }
        });
    </script>
</body>
</html>
